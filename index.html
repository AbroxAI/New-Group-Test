<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PocketOptionInside</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ---------- ROOT & BASE ---------- */
    :root{
      --bg:#ebf1fa;
      --card:#ffffff;
      --ink:#1f2633;
      --muted:#7f8794;
      --blue:#2e9fe8;
      --blue-dark:#24263d;
      --green:#4ab54d;
      --yellow:#f3bf23;
      --line:#dfe6f1;
      --shadow:0 8px 26px rgba(15,23,42,.08);
      --soft:0 4px 14px rgba(15,23,42,.05);
    }

    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:#b6c5dd;border-radius:999px;}

    .app{
      max-width:430px;
      margin:0 auto;
      padding:10px 10px 104px;
      box-sizing:border-box;
      position:relative;
      min-height:100vh;
    }

    .app.chat-open{
      padding-bottom:10px;
    }

    .page{display:none;}
    .page.active{display:block;}

    /* ---------- TOPBAR ---------- */
    .topbar{
      height:56px;
      background:#26263e;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px 0 10px;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
      overflow:hidden;
      border-radius:0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:7px;
      color:#fff;
      min-width:0;
    }
    .brand-mark{
      width:36px;height:26px;border-radius:6px 16px 6px 16px;
      background:linear-gradient(135deg,#0e75ef 0%,#4cb3ff 100%);
      position:relative;flex:0 0 auto;
    }
    .brand-mark::after{
      content:"";position:absolute;left:11px;top:0;width:16px;height:26px;border-radius:0 16px 16px 0;background:#1228c8;opacity:.96;
    }
    .brand-text{
      font-size:16px;
      font-weight:500;
      letter-spacing:-.2px;
      white-space:nowrap;
    }
    .user-chip{
      display:flex;align-items:center;gap:7px;color:#e7ebf2;font-size:15px;white-space:nowrap;flex:0 0 auto;
    }
    .lvl-badge{
      height:25px;min-width:60px;padding:0 11px;border-radius:7px;background:#f6f7fb;color:#22263d;
      display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);
    }
    .flag-round{
      width:25px;height:25px;border-radius:999px;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px rgba(255,255,255,.15);
      flex:0 0 auto;
    }
    .flag-round img{width:100%;height:100%;object-fit:cover;display:block;}

    /* ---------- CURRENCY & SIGNAL UI ---------- */
    .currency-scroll{
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      margin:11px 0 7px;
      padding-bottom:2px;
    }
    .currency-list{display:flex;gap:9px;align-items:center;min-width:max-content;}
    .currency-pill{
      height:29px;
      padding:0 12px 0 8px;
      border-radius:9px;
      border:1px solid #d7dce7;
      background:#fff;
      display:inline-flex;
      align-items:center;
      gap:8px;
      box-shadow:0 1px 0 rgba(255,255,255,.9), inset 0 -1px 0 rgba(0,0,0,.03);
      color:#3a4150;
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      user-select:none;
      flex:0 0 auto;
    }
    .currency-pill.active{
      background:#23263b;
      color:#fff;
      border-color:#1b1d2e;
      box-shadow:0 6px 16px rgba(35,38,59,.18);
    }
    .pair-icon-group{display:inline-flex;align-items:center;}
    .pair-icon{
      width:18px;height:18px;border-radius:999px;overflow:hidden;display:inline-block;box-shadow:0 0 0 1px rgba(0,0,0,.08);margin-left:-4px;background:#fff;
    }
    .pair-icon:first-child{margin-left:0;}
    .pair-icon img{width:100%;height:100%;object-fit:cover;display:block;}

    .time-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin:8px 0 9px;
    }
    .current-time{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }
    .time-label{font-size:13px;color:#8a93a2;line-height:1.1;font-weight:400;}
    .time-value{font-size:18px;color:#303747;font-weight:600;line-height:1.1;letter-spacing:-.2px;}

    .timer-wrap{
      display:inline-flex;
      align-items:center;
      gap:0;
      background:#fff;
      border:1px solid #edf0f5;
      border-radius:12px;
      box-shadow:var(--soft);
      overflow:hidden;
      flex:0 0 auto;
    }
    .timer-btn{
      height:38px;
      min-width:84px;
      border:none;
      background:#fff;
      color:#8d94a4;
      font-size:14px;
      font-weight:500;
      cursor:pointer;
      padding:0 12px;
      border-right:1px solid #f0f2f6;
    }
    .timer-btn:last-child{border-right:none;}
    .timer-btn.active{
      background:#23263b;
      color:#fff;
      font-weight:600;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .frame{
      background:#fff;
      border-radius:18px;
      box-shadow:var(--shadow);
      border:1px solid #e8edf5;
      overflow:hidden;
    }

    .result-row{
      display:flex;
      align-items:stretch;
      min-height:640px;
      width:100%;
      position:relative;
    }
    .rail{
      flex:0 0 52px;
      width:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      writing-mode:vertical-rl;
      transform:rotate(180deg);
      line-height:1;
      letter-spacing:.15px;
      user-select:none;
    }
    .rail.green{
      background:linear-gradient(180deg,#58bd4d 0%,#49b343 100%);
      color:#fff;
      border-radius:18px 0 0 18px;
      font-size:16px;
      font-weight:500;
      flex-direction:row;
      box-shadow:inset -1px 0 0 rgba(255,255,255,.12);
    }
    .rail.yellow{
      background:linear-gradient(180deg,#f8cf3d 0%,#f2bc12 100%);
      color:#342900;
      border-radius:0 18px 18px 0;
      flex:0 0 56px;
      width:56px;
      font-size:11px;
      font-weight:700;
      text-align:center;
      padding:10px 0;
    }

    .edge-strip{
      flex:0 0 56px;
      width:56px;
      background:#d9dfea;
      color:#263044;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      justify-content:stretch;
      overflow:hidden;
      border-left:1px solid rgba(255,255,255,.38);
      border-right:1px solid rgba(255,255,255,.56);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .edge-half{
      flex:1 1 50%;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      writing-mode:vertical-rl;
      transform:rotate(180deg);
      font-size:14px;
      font-weight:400;
      line-height:1;
      letter-spacing:.05px;
      padding:6px 0;
      box-sizing:border-box;
    }
    .edge-divider{
      width:100%;
      height:1px;
      background:rgba(255,255,255,.76);
      box-shadow:0 -1px 0 rgba(0,0,0,.02) inset, 0 1px 0 rgba(255,255,255,.85) inset;
      flex:0 0 auto;
    }

    .main-panel{
      flex:1 1 auto;
      padding:12px 10px 11px;
      background:#fff;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      justify-content:flex-start;
      border-right:1px solid #eef2f8;
      min-width:0;
    }

    .panel-divider{
      height:1px;
      background:#e8edf5;
      margin:14px 0 15px;
      width:100%;
      box-shadow:0 1px 0 rgba(255,255,255,.8);
    }

    /* ---------- CARDS ---------- */
    .result-card,
    .signal-box,
    .simple-page,
    .home-hero,
    .page-header-card,
    .home-card,
    .practice-card,
    .invite-card,
    .progress-card,
    .ref-stat-card,
    .lesson-card,
    .milestone-item,
    .activity-item{
      background:#fff;
      border:1px solid #e6ecf5;
      border-radius:16px;
      box-shadow:var(--shadow);
    }

    .result-card{
      background:#24263b;
      border-radius:7px;
      padding:8px 9px 7px;
      color:#fff;
      box-shadow:0 5px 12px rgba(15,18,35,.14);
      min-height:72px;
      margin:0 auto 12px;
      width:100%;
      box-sizing:border-box;
      border:none;
    }
    .result-top,
    .result-bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }
    .result-top{margin-bottom:6px; align-items:flex-start;}
    .pair-inline{
      display:flex;
      align-items:center;
      gap:4px;
      min-width:0;
      flex:1 1 auto;
      flex-wrap:wrap;
    }
    .star{font-size:15px;color:#d9c08a;transform:translateY(-1px);flex:0 0 auto;}
    .pair-name{
      font-size:12px;
      font-weight:400;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      line-height:1.15;
      word-break:break-word;
    }
    .profit{font-size:12px;font-weight:500;color:#64d17f;white-space:nowrap;}
    .result-time{font-size:12px;font-weight:400;color:#fff;opacity:.96;white-space:nowrap;flex:0 0 auto;}
    .stake-row{display:flex;align-items:center;gap:4px;font-size:12px;line-height:1;white-space:nowrap;}
    .stake-row .up{color:#58c15f;font-size:15px;line-height:1;}
    .amt{font-weight:600;color:#67d478;font-size:12px;white-space:nowrap;}
    .amt-center{font-weight:500;color:#66d378;font-size:12px;white-space:nowrap;}

    .signal-btn{
      width:100%;
      height:44px;
      border:none;
      border-radius:11px;
      background:linear-gradient(180deg,#39a7ed 0%,#309de8 100%);
      color:#fff;
      font-size:17px;
      font-weight:600;
      box-shadow:0 8px 16px rgba(48,157,232,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      cursor:pointer;
      margin-bottom:12px;
    }

    .signal-box{
      background:#fff;
      border-radius:12px;
      padding:15px 13px 13px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:172px;
      box-sizing:border-box;
    }
    .signal-title{
      display:flex;
      align-items:center;
      gap:9px;
      color:#121826;
      font-size:17px;
      font-weight:700;
      margin-bottom:10px;
    }
    .signal-line{
      display:flex;
      align-items:center;
      gap:9px;
      color:#4d586a;
      font-size:15px;
      margin:8px 0;
      font-weight:400;
    }
    .signal-line i{color:#2fa5ef;}
    .signal-action{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:4px;
    }
    .antenna-icon{color:#2fa5ef;flex:0 0 auto;}
    .signal-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      width:max-content;
      border:1px solid #b9d7ba;
      color:#71b873;
      background:#fbfffb;
      border-radius:6px;
      padding:3px 12px;
      font-size:15px;
      font-weight:500;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.45);
    }
    .signal-badge i{color:#49b343;}

    .support-wrap{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }
    .support-pill{
      width:100%;
      max-width:216px;
      height:40px;
      border-radius:8px;
      background:#2f9fe9;
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:17px;
      font-weight:600;
      box-shadow:0 8px 16px rgba(47,159,233,.22);
    }
    .accuracy{
      margin-top:11px;
      color:#55ad63;
      font-size:25px;
      line-height:1;
      font-weight:700;
      letter-spacing:-.2px;
    }
    .accuracy-note{
      margin-top:10px;
      color:#788191;
      font-size:14px;
      line-height:1.2;
      font-weight:400;
    }

    /* ---------- HOME & OTHER PAGES ---------- */
    .home-hero{
      padding:16px;
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .home-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .home-kicker,.page-kicker,.invite-label,.ref-stat-label,.mini-stat-label,.page-section-title{
      font-size:11px;
      color:#7f8794;
      letter-spacing:.2px;
      text-transform:uppercase;
      font-weight:700;
    }
    .home-title,.page-title{
      margin:3px 0 6px;
      font-size:24px;
      line-height:1.1;
      color:#1f2633;
      font-weight:800;
      letter-spacing:-.3px;
    }
    .home-subtitle,.page-text{
      margin:0;
      color:#667085;
      font-size:14px;
      line-height:1.45;
    }
    .home-avatar{
      width:42px;
      height:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#eff6ff;
      color:#2f98e5;
      flex:0 0 auto;
      overflow:hidden;
    }
    .home-logo{
      background:transparent;
      padding:0;
    }
    .home-logo .brand-mark{
      width:42px;
      height:30px;
    }

    .home-stat-grid,
    .ref-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
      margin-top:0;
    }
    .mini-stat,
    .ref-stat-card{
      padding:12px 12px 11px;
      border-radius:14px;
      background:#f9fbfe;
      border:1px solid #edf2f8;
      display:flex;
      flex-direction:column;
      gap:5px;
      min-height:72px;
    }
    .mini-stat-value,.ref-stat-value{
      font-size:18px;
      font-weight:700;
      color:#233044;
      line-height:1;
    }
    .home-card{
      margin-top:0;
      padding:14px;
    }
    .home-card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }
    .home-card-title,.lesson-title{
      font-size:15px;
      font-weight:700;
      color:#1f2633;
    }
    .home-badge{
      font-size:11px;
      font-weight:700;
      color:#2f98e5;
      background:#eef7ff;
      padding:5px 8px;
      border-radius:999px;
    }
    .home-signal-pair{
      font-size:18px;
      font-weight:800;
      color:#24263b;
      letter-spacing:-.2px;
      margin-top:2px;
      white-space:normal;
      overflow:visible;
      word-break:break-word;
    }
    .home-signal-row,
    .progress-row,
    .practice-row,
    .activity-item,
    .milestone-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .home-signal-row{margin-top:8px;color:#5a6475;font-size:14px;}
    .home-signal-direction{font-weight:600;color:#49b343;}
    .home-signal-time{white-space:nowrap;}
    .home-signal-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:12px;
      font-size:12px;
      color:#667085;
    }
    .home-signal-meta span{
      background:#f4f7fb;
      border:1px solid #edf2f8;
      border-radius:999px;
      padding:6px 9px;
      white-space:nowrap;
    }
    .home-grid{
      margin-top:0;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .home-action-card,
    .lesson-card,
    .milestone-item,
    .activity-item{
      padding:14px;
    }
    .home-action-card{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-height:92px;
    }
    .home-action-title{font-weight:700;font-size:14px;color:#1f2633;}
    .home-action-text{font-size:12px;color:#667085;margin-top:3px;line-height:1.35;}

    .page-header-card{
      margin-top:10px;
      padding:16px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .page-section-title{
      margin:14px 2px 8px;
      font-size:12px;
      color:#7f8794;
      letter-spacing:.2px;
    }
    .lesson-list,
    .activity-list,
    .milestone-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .lesson-card{
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-height:92px;
    }
    .lesson-icon{
      width:36px;
      height:36px;
      border-radius:12px;
      background:#eff6ff;
      color:#2f98e5;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }
    .lesson-text{font-size:12px;color:#667085;margin-top:3px;line-height:1.35;}
    .practice-card,
    .invite-card,
    .progress-card{
      margin-top:10px;
      padding:14px;
    }
    .practice-row,
    .activity-item,
    .milestone-item,
    .progress-row{
      padding:11px 0;
      border-bottom:1px solid #eef2f8;
      font-size:14px;
      color:#344054;
    }
    .practice-row:last-child,
    .activity-item:last-child,
    .milestone-item:last-child,
    .progress-row:last-child{border-bottom:none;padding-bottom:0;}
    .progress-card{
      display:flex;
      align-items:center;
      gap:16px;
    }
    .progress-ring{
      width:106px;
      height:106px;
      border-radius:50%;
      background:conic-gradient(#2f98e5 0 72%, #e8edf5 72% 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }
    .progress-ring-inner{
      width:76px;
      height:76px;
      border-radius:50%;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      box-shadow:inset 0 0 0 1px #eef2f8;
    }
    .progress-ring-value{font-size:18px;font-weight:800;color:#1f2633;line-height:1;}
    .progress-ring-label{font-size:11px;color:#7f8794;margin-top:4px;}
    .progress-summary{flex:1 1 auto;display:flex;flex-direction:column;gap:2px;}
    .progress-row strong{font-size:14px;color:#1f2633;}
    .invite-link{
      margin-top:8px;
      font-size:13px;
      word-break:break-all;
      color:#344054;
      background:#f9fbfe;
      border:1px solid #edf2f8;
      border-radius:12px;
      padding:10px 12px;
    }
    .invite-btn{
      margin-top:10px;
      width:100%;
      height:40px;
      border:none;
      border-radius:12px;
      background:#2f98e5;
      color:#fff;
      font-weight:700;
      font-size:14px;
      box-shadow:0 8px 16px rgba(47,152,229,.18);
      cursor:pointer;
    }
    .milestone-item{
      gap:10px;
      justify-content:flex-start;
      color:#344054;
      align-items:center;
    }
    .milestone-item.done{color:#1f7a3b;}
    .milestone-item svg{flex:0 0 auto;}
    .referrals-header{align-items:center;}

    /* ---------- CHAT LIST ---------- */
    .chat-section-label{
      margin:14px 2px 8px;
      font-size:12px;
      color:#7f8794;
      letter-spacing:.2px;
      text-transform:uppercase;
      font-weight:700;
    }

    .chat-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .chat-item{
      width:100%;
      border:none;
      background:#fff;
      border:1px solid #e6ecf5;
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:14px;
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      text-align:left;
      -webkit-tap-highlight-color:transparent;
    }

    .chat-item.active-room{
      border-color:#bcdcff;
      box-shadow:0 10px 22px rgba(47,152,229,.12);
    }

    .chat-item:active{
      transform:scale(.995);
    }

    .chat-avatar{
      width:64px;
      height:64px;
      border-radius:20px;
      background:#f8fbff;
      border:1px solid #edf2f8;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.8);
    }

    .chat-avatar-support{
      background:linear-gradient(180deg,#fbfdff 0%,#f4f9ff 100%);
    }

    .chat-support-ring{
      width:52px;
      height:52px;
      border-radius:50%;
