<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ProChat · AI Community</title>
  <!-- Tailwind + Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* custom smooth styles & theme variables */
    :root {
      --bg-primary: #f5f7fb;
      --bg-secondary: #ffffff;
      --text-primary: #1e1f22;
      --text-secondary: #5b5c63;
      --border-light: #e9ebf0;
      --accent: #2f5b9c;
      --accent-soft: #eef3fc;
      --bubble-in: #ffffff;
      --bubble-out: #2f5b9c;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
    }
    .dark {
      --bg-primary: #1e1f22;
      --bg-secondary: #2b2d31;
      --text-primary: #f2f3f5;
      --text-secondary: #b5bac1;
      --border-light: #3c3f45;
      --accent: #5b8fd9;
      --accent-soft: #2c3a52;
      --bubble-in: #2b2d31;
      --bubble-out: #5b8fd9;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.2s, color 0.2s;
    }
    /* custom scroll */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
    .dark ::-webkit-scrollbar-thumb { background: #4e525b; }

    /* layout */
    .app-container {
      display: flex;
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      background: var(--bg-secondary);
      box-shadow: var(--shadow-md);
    }
    /* chat list panel */
    .chat-list-panel {
      width: 320px;
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
    }
    .list-header {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
    }
    .list-header h2 {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      margin: 0;
      color: var(--text-primary);
    }
    .theme-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 30px;
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .theme-toggle:hover { background: var(--accent-soft); }
    
    .chat-rooms-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px 16px;
    }
    .room-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 12px;
      border-radius: 16px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--text-primary);
    }
    .room-item:hover { background: var(--accent-soft); }
    .room-item.active {
      background: var(--accent);
      color: white;
    }
    .room-item.active .room-preview,
    .room-item.active .room-meta { color: rgba(255,255,255,0.8); }
    .room-avatar {
      width: 48px; height: 48px;
      border-radius: 16px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--accent);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }
    .room-info { flex: 1; min-width: 0; }
    .room-name {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      justify-content: space-between;
    }
    .room-preview {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .room-meta {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* chat room panel */
    .chat-room-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header h3 {
      margin: 0;
      font-weight: 700;
      font-size: 1.25rem;
    }
    .chat-header-sub {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .chat-feed {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--bg-primary);
    }
    /* message bubbles */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 85%;
    }
    .msg-row.incoming { align-self: flex-start; }
    .msg-row.outgoing { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
      overflow: hidden;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-bubble {
      background: var(--bubble-in);
      padding: 10px 14px;
      border-radius: 18px;
      border-top-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
      word-break: break-word;
    }
    .outgoing .msg-bubble {
      background: var(--bubble-out);
      color: white;
      border: none;
      border-top-right-radius: 4px;
      border-top-left-radius: 18px;
    }
    .msg-sender {
      font-weight: 700;
      font-size: 0.8rem;
      margin-bottom: 4px;
      color: var(--accent);
    }
    .outgoing .msg-sender { color: rgba(255,255,255,0.9); }
    .msg-time {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    .reply-preview-inline {
      background: rgba(0,0,0,0.05);
      border-left: 3px solid var(--accent);
      padding: 6px 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      font-size: 0.8rem;
    }
    .dark .reply-preview-inline { background: rgba(255,255,255,0.08); }
    
    /* typing */
    .typing-dots { display: flex; gap: 4px; padding: 8px 0; }
    .typing-dots span {
      width: 8px; height: 8px; background: var(--text-secondary);
      border-radius: 50%; animation: bounce 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* composer */
    .chat-composer {
      padding: 16px 20px;
      border-top: 1px solid var(--border-light);
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg-secondary);
    }
    .composer-input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: 30px;
      padding: 12px 18px;
      font-size: 0.95rem;
      outline: none;
      color: var(--text-primary);
    }
    .composer-input:focus { border-color: var(--accent); }
    .send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.9; }
    
    /* empty state */
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: var(--text-secondary);
    }
    
    /* responsive */
    @media (max-width: 700px) {
      .app-container { flex-direction: column; }
      .chat-list-panel { width: 100%; height: 100%; }
      .chat-room-panel { display: none; }
      .chat-room-panel.active { display: flex; }
      .chat-list-panel.hidden-on-mobile { display: none; }
    }

    /* profile modal */
    .profile-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(4px);
    }
    .profile-card {
      background: var(--bg-secondary);
      border-radius: 28px;
      padding: 24px;
      max-width: 340px;
      width: 90%;
      box-shadow: var(--shadow-md);
    }
  </style>
</head>
<body class="light">

<div class="app-container">
  <!-- LEFT: CHAT LIST -->
  <div class="chat-list-panel" id="chatListPanel">
    <div class="list-header">
      <h2>ProChat</h2>
      <div class="theme-toggle" id="themeToggle">
        <i data-lucide="sun" id="lightIcon" class="w-4 h-4"></i>
        <i data-lucide="moon" id="darkIcon" class="w-4 h-4 hidden"></i>
        <span class="text-sm">Theme</span>
      </div>
    </div>
    <div class="chat-rooms-list" id="roomsListContainer">
      <!-- rooms will be injected -->
    </div>
    <div style="padding:12px; border-top:1px solid var(--border-light); font-size:0.75rem; color:var(--text-secondary); text-align:center;">
      <span id="onlineCount">0</span> personas online
    </div>
  </div>

  <!-- RIGHT: CHAT ROOM -->
  <div class="chat-room-panel" id="chatRoomPanel">
    <div class="chat-header">
      <button id="mobileBackBtn" class="md:hidden mr-2 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
        <i data-lucide="arrow-left"></i>
      </button>
      <div>
        <h3 id="roomTitle">General Chat</h3>
        <div class="chat-header-sub" id="roomSubtitle">Community · 450+ members</div>
      </div>
    </div>

    <!-- reply preview bar (global) -->
    <div id="globalReplyBar" style="display:none; padding:10px 20px; background:var(--accent-soft); border-bottom:1px solid var(--border-light);">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div>
          <span style="font-weight:600; color:var(--accent);">Replying to <span id="replyToName"></span></span>
          <div style="font-size:0.8rem; opacity:0.8;" id="replyToPreview"></div>
        </div>
        <button id="cancelReplyBtn" style="background:none; border:none; color:var(--text-secondary); cursor:pointer;">✕</button>
      </div>
    </div>

    <div class="chat-feed" id="chatMessagesContainer">
      <div class="empty-chat">
        <i data-lucide="messages-square" class="w-12 h-12 mb-3 opacity-40"></i>
        <p class="text-lg font-medium">Welcome to ProChat</p>
        <p class="text-sm opacity-70">AI personas are ready to chat</p>
      </div>
    </div>

    <div class="chat-composer">
      <input type="text" id="messageInput" class="composer-input" placeholder="Message..." autocomplete="off">
      <button class="send-btn" id="sendMessageBtn">
        <i data-lucide="send" class="w-4 h-4"></i> Send
      </button>
    </div>
  </div>
</div>

<!-- PROFILE MODAL (hidden) -->
<div id="profileModalOverlay" class="profile-modal" style="display:none;">
  <div class="profile-card" id="profileModalContent"></div>
</div>

<script>
  // ---------- THEME TOGGLE ----------
  const themeToggle = document.getElementById('themeToggle');
  const lightIcon = document.getElementById('lightIcon');
  const darkIcon = document.getElementById('darkIcon');
  const htmlEl = document.documentElement;
  themeToggle.addEventListener('click', () => {
    htmlEl.classList.toggle('dark');
    const isDark = htmlEl.classList.contains('dark');
    lightIcon.classList.toggle('hidden', isDark);
    darkIcon.classList.toggle('hidden', !isDark);
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });
  if (localStorage.getItem('theme') === 'dark') {
    htmlEl.classList.add('dark');
    lightIcon.classList.add('hidden');
    darkIcon.classList.remove('hidden');
  }

  // ---------- CHAT STATE ----------
  const rooms = {
    general: { name: 'General Chat', description: 'Community · 450+ members', starter: [
      { side: 'incoming', sender: 'System', text: 'Welcome to General Chat. AI personas are active.', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }
    ]},
    traders: { name: 'Traders Lounge', description: 'Experienced & beginners', starter: [
      { side: 'incoming', sender: 'System', text: 'Discuss strategies, ask questions.', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }
    ]},
    beginners: { name: 'Beginners', description: 'Learning together', starter: [
      { side: 'incoming', sender: 'System', text: 'A safe space for new traders.', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }
    ]}
  };
  let currentRoom = 'general';
  let replyingTo = null;
  const recentMessages = []; // for engine replies
  
  // DOM elements
  const roomsContainer = document.getElementById('roomsListContainer');
  const chatMessagesDiv = document.getElementById('chatMessagesContainer');
  const roomTitle = document.getElementById('roomTitle');
  const roomSubtitle = document.getElementById('roomSubtitle');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendMessageBtn');
  const globalReplyBar = document.getElementById('globalReplyBar');
  const replyToName = document.getElementById('replyToName');
  const replyToPreview = document.getElementById('replyToPreview');
  const cancelReplyBtn = document.getElementById('cancelReplyBtn');
  const mobileBackBtn = document.getElementById('mobileBackBtn');
  const chatListPanel = document.getElementById('chatListPanel');
  const chatRoomPanel = document.getElementById('chatRoomPanel');
  
  // profile modal
  const profileModal = document.getElementById('profileModalOverlay');
  const profileContent = document.getElementById('profileModalContent');

  // Render rooms list
  function renderRoomList() {
    roomsContainer.innerHTML = '';
    Object.entries(rooms).forEach(([key, room]) => {
      const div = document.createElement('div');
      div.className = `room-item ${key === currentRoom ? 'active' : ''}`;
      div.innerHTML = `
        <div class="room-avatar"><i data-lucide="users"></i></div>
        <div class="room-info">
          <div class="room-name">${room.name}</div>
          <div class="room-preview">${room.description}</div>
          <div class="room-meta">● active now</div>
        </div>
      `;
      div.addEventListener('click', () => switchRoom(key));
      roomsContainer.appendChild(div);
    });
    lucide.createIcons();
  }

  function switchRoom(roomKey) {
    currentRoom = roomKey;
    window.__activeChatRoom = roomKey;
    renderRoomList();
    const room = rooms[roomKey];
    roomTitle.textContent = room.name;
    roomSubtitle.textContent = room.description;
    // clear feed and load starter
    chatMessagesDiv.innerHTML = '';
    room.starter.forEach(msg => addMessageToFeed(msg.side, msg.sender, msg.text, msg.time));
    // load persisted
    loadMessagesFromStorage(roomKey);
    scrollToBottom();
    
    // mobile: show chat panel
    chatRoomPanel.classList.add('active');
    chatListPanel.classList.add('hidden-on-mobile');
    
    window.dispatchEvent(new CustomEvent('chat-room-changed', { detail: { roomKey } }));
  }

  // Message rendering
  function addMessageToFeed(side, sender, text, time, options = {}) {
    const row = document.createElement('div');
    row.className = `msg-row ${side}`;
    const msgId = options.id || 'msg_' + Date.now() + Math.random().toString(36);
    row.dataset.messageId = msgId;
    row.__messageData = { id: msgId, senderName: sender, text, personaId: options.personaId || null };
    
    // avatar
    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'msg-avatar';
    if (options.avatar) {
      const img = document.createElement('img');
      img.src = options.avatar;
      img.alt = sender;
      img.onerror = () => { avatarDiv.textContent = sender.charAt(0).toUpperCase(); };
      avatarDiv.appendChild(img);
    } else {
      avatarDiv.textContent = sender.charAt(0).toUpperCase();
    }
    
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    let content = '';
    if (side === 'incoming') {
      content += `<div class="msg-sender">${escapeHtml(sender)}</div>`;
    }
    // reply preview inline (if present)
    if (options.replyTo) {
      content += `<div class="reply-preview-inline">
        <div style="font-weight:600; font-size:0.7rem;">↩ Replying to ${escapeHtml(options.replyTo.senderName)}</div>
        <div style="opacity:0.8;">${escapeHtml(options.replyTo.text.substring(0,60))}</div>
      </div>`;
    }
    content += escapeHtml(text);
    if (options.imageUrl) {
      content += `<img src="${options.imageUrl}" style="max-width:200px; border-radius:12px; margin-top:8px;">`;
    }
    content += `<div class="msg-time">${time}</div>`;
    bubble.innerHTML = content;
    
    row.appendChild(avatarDiv);
    row.appendChild(bubble);
    
    // click to set reply (only for non-user messages)
    row.addEventListener('click', (e) => {
      if (e.target.closest('.reply-preview-inline')) return;
      const data = row.__messageData;
      if (data && data.personaId && data.personaId !== 'user') {
        // AI message, set global reply bar
        replyingTo = data;
        replyToName.textContent = data.senderName;
        replyToPreview.textContent = data.text.substring(0, 60);
        globalReplyBar.style.display = 'block';
      }
    });
    
    // click on sender name to show profile
    const nameSpan = bubble.querySelector('.msg-sender');
    if (nameSpan && options.personaId && options.personaId !== 'system') {
      nameSpan.style.cursor = 'pointer';
      nameSpan.addEventListener('click', (e) => {
        e.stopPropagation();
        showProfile({ senderName: sender, senderAvatar: options.avatar, personaId: options.personaId, ...options });
      });
    }
    
    chatMessagesDiv.appendChild(row);
    if (options.shouldSave !== false) saveMessagesToStorage();
    return row;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function scrollToBottom() {
    chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
  }

  // Storage
  const STORAGE_PREFIX = 'prochat_msgs_';
  function saveMessagesToStorage() {
    const messages = [];
    document.querySelectorAll('#chatMessagesContainer .msg-row').forEach(row => {
      const side = row.classList.contains('outgoing') ? 'outgoing' : 'incoming';
      const bubble = row.querySelector('.msg-bubble');
      const sender = bubble.querySelector('.msg-sender')?.innerText || (side==='outgoing'?'You':'Unknown');
      const time = bubble.querySelector('.msg-time')?.innerText || '';
      const text = bubble.innerText.replace(sender, '').replace(time, '').trim();
      messages.push({ side, sender, text, time });
    });
    localStorage.setItem(STORAGE_PREFIX + currentRoom, JSON.stringify(messages));
  }
  function loadMessagesFromStorage(roomKey) {
    const stored = localStorage.getItem(STORAGE_PREFIX + roomKey);
    if (!stored) return;
    try {
      JSON.parse(stored).forEach(m => addMessageToFeed(m.side, m.sender, m.text, m.time, { shouldSave: false }));
    } catch(e) {}
  }

  // Send message (user)
  function sendUserMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const replyData = replyingTo ? { senderName: replyingTo.senderName, text: replyingTo.text } : null;
    addMessageToFeed('outgoing', 'You', text, time, { personaId: 'user', replyTo: replyData });
    
    // notify engine
    if (window.onUserMessage) {
      window.onUserMessage({ senderName: 'You', text });
    }
    recentMessages.push({ id: 'user_'+Date.now(), personaId:'user', senderName:'You', text });
    if (recentMessages.length > 30) recentMessages.shift();
    
    messageInput.value = '';
    replyingTo = null;
    globalReplyBar.style.display = 'none';
    scrollToBottom();
  }

  // Profile modal
  function showProfile(data) {
    profileContent.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="msg-avatar" style="width:80px;height:80px; font-size:32px; margin-bottom:16px;">
          ${data.senderAvatar ? `<img src="${data.senderAvatar}" style="width:100%;height:100%;">` : data.senderName.charAt(0)}
        </div>
        <h3 style="margin:0 0 8px;">${escapeHtml(data.senderName)}</h3>
        <p style="color:var(--text-secondary);">AI Persona · ${data.personaId || 'active'}</p>
        <button style="margin-top:20px; padding:8px 20px; background:var(--accent); color:white; border:none; border-radius:30px;" onclick="document.getElementById('profileModalOverlay').style.display='none'">Close</button>
      </div>
    `;
    profileModal.style.display = 'flex';
  }
  profileModal.addEventListener('click', (e) => { if (e.target === profileModal) profileModal.style.display = 'none'; });

  // Chat API bridge for engine
  window.chatAPI = {
    showTypingForPersona: (persona) => {
      document.getElementById('typingIndicator')?.remove();
      const row = document.createElement('div');
      row.className = 'msg-row incoming';
      row.id = 'typingIndicator';
      row.innerHTML = `
        <div class="msg-avatar">${persona.avatar ? `<img src="${persona.avatar}">` : persona.name.charAt(0)}</div>
        <div class="msg-bubble typing-dots"><span></span><span></span><span></span></div>
      `;
      chatMessagesDiv.appendChild(row);
      scrollToBottom();
    },
    hideTyping: () => document.getElementById('typingIndicator')?.remove(),
    addIncomingMessage: (msgData) => {
      const row = addMessageToFeed('incoming', msgData.senderName, msgData.text, msgData.time, {
        avatar: msgData.senderAvatar,
        personaId: msgData.personaId,
        replyTo: msgData.replyTo
      });
      recentMessages.push({ id: msgData.personaId+'_'+Date.now(), personaId: msgData.personaId, senderName: msgData.senderName, text: msgData.text });
      if (recentMessages.length > 30) recentMessages.shift();
      return row;
    },
    addSystemMessage: (msgData) => {
      addMessageToFeed('incoming', 'System', msgData.text, msgData.time, { personaId: 'system' });
    },
    isChatRoomActive: () => true,
    getCurrentRoom: () => currentRoom
  };
  window.__activeChatRoom = currentRoom;

  // Event listeners
  sendBtn.addEventListener('click', sendUserMessage);
  messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendUserMessage(); });
  cancelReplyBtn.addEventListener('click', () => {
    replyingTo = null;
    globalReplyBar.style.display = 'none';
  });
  mobileBackBtn.addEventListener('click', () => {
    chatRoomPanel.classList.remove('active');
    chatListPanel.classList.remove('hidden-on-mobile');
  });

  // Initialize
  renderRoomList();
  switchRoom('general');
  
  // Load AI engine (will be included via script tag at bottom)
  // We'll define recentMessages for engine access
